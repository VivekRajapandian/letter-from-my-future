databaseChangeLog:
  - changeSet:
      id: 021-refresh-tokens
      author: vivek
      changes:

        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: uuid_generate_v4()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_refresh_tokens

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: token_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: revoked_at
                  type: TIMESTAMP

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: device_info
                  type: VARCHAR(500)

        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_refresh_tokens_user

        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_user
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_expires_at
            columns:
              - column:
                  name: expires_at

        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_revoked_at
            columns:
              - column:
                  name: revoked_at

        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_user_revoked
            columns:
              - column:
                  name: user_id
              - column:
                  name: revoked_at

        - addUniqueConstraint:
            tableName: refresh_tokens
            columnNames: token_hash
            constraintName: uq_refresh_tokens_token_hash