databaseChangeLog:
  - changeSet:
      id: 026-create-task-input-definition
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - not:
            tableExists:
              tableName: task_input_definition
      changes:
        - createTable:
            tableName: task_input_definition
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: key
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: label
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: field_type
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: required
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: placeholder
                  type: TEXT
              - column:
                  name: help_text
                  type: TEXT
              - column:
                  name: order_index
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: unit
                  type: TEXT
              - column:
                  name: options_json
                  type: TEXT
              - column:
                  name: validation_json
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 026-fk-task-input-definition-task
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: task_input_definition
        - tableExists:
            tableName: tasks
        - not:
            foreignKeyConstraintExists:
              foreignKeyName: fk_task_input_definition_task
      changes:
        - addForeignKeyConstraint:
            baseTableName: task_input_definition
            baseColumnNames: task_id
            constraintName: fk_task_input_definition_task
            referencedTableName: tasks
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 026-create-task-submission
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - not:
            tableExists:
              tableName: task_submission
      changes:
        - createTable:
            tableName: task_submission
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: note
                  type: TEXT
              - column:
                  name: submitted_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 026-fk-task-submission-task
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: task_submission
        - tableExists:
            tableName: tasks
        - not:
            foreignKeyConstraintExists:
              foreignKeyName: fk_task_submission_task
      changes:
        - addForeignKeyConstraint:
            baseTableName: task_submission
            baseColumnNames: task_id
            constraintName: fk_task_submission_task
            referencedTableName: tasks
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 026-fk-task-submission-user
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: task_submission
        - tableExists:
            tableName: users
        - not:
            foreignKeyConstraintExists:
              foreignKeyName: fk_task_submission_user
      changes:
        - addForeignKeyConstraint:
            baseTableName: task_submission
            baseColumnNames: user_id
            constraintName: fk_task_submission_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 026-create-task-submission-value
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - not:
            tableExists:
              tableName: task_submission_value
      changes:
        - createTable:
            tableName: task_submission_value
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: submission_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: input_definition_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: value_text
                  type: TEXT
              - column:
                  name: value_number
                  type: DECIMAL(19,2)
              - column:
                  name: value_boolean
                  type: BOOLEAN
              - column:
                  name: value_date
                  type: DATE
              - column:
                  name: value_json
                  type: TEXT

  - changeSet:
      id: 026-fk-task-submission-value-submission
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: task_submission_value
        - tableExists:
            tableName: task_submission
        - not:
            foreignKeyConstraintExists:
              foreignKeyName: fk_task_submission_value_submission
      changes:
        - addForeignKeyConstraint:
            baseTableName: task_submission_value
            baseColumnNames: submission_id
            constraintName: fk_task_submission_value_submission
            referencedTableName: task_submission
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 026-fk-task-submission-value-input-definition
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: task_submission_value
        - tableExists:
            tableName: task_input_definition
        - not:
            foreignKeyConstraintExists:
              foreignKeyName: fk_task_submission_value_input_definition
      changes:
        - addForeignKeyConstraint:
            baseTableName: task_submission_value
            baseColumnNames: input_definition_id
            constraintName: fk_task_submission_value_input_definition
            referencedTableName: task_input_definition
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 026-index-task-input-definition-task-id
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: task_input_definition
        - not:
            indexExists:
              indexName: idx_task_input_definition_task_id
              tableName: task_input_definition
      changes:
        - createIndex:
            tableName: task_input_definition
            indexName: idx_task_input_definition_task_id
            columns:
              - column:
                  name: task_id

  - changeSet:
      id: 026-index-task-submission-task-id
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: task_submission
        - not:
            indexExists:
              indexName: idx_task_submission_task_id
              tableName: task_submission
      changes:
        - createIndex:
            tableName: task_submission
            indexName: idx_task_submission_task_id
            columns:
              - column:
                  name: task_id

  - changeSet:
      id: 026-index-task-submission-user-id
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: task_submission
        - not:
            indexExists:
              indexName: idx_task_submission_user_id
              tableName: task_submission
      changes:
        - createIndex:
            tableName: task_submission
            indexName: idx_task_submission_user_id
            columns:
              - column:
                  name: user_id

  - changeSet:
      id: 026-index-task-submission-value-submission-id
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: task_submission_value
        - not:
            indexExists:
              indexName: idx_task_submission_value_submission_id
              tableName: task_submission_value
      changes:
        - createIndex:
            tableName: task_submission_value
            indexName: idx_task_submission_value_submission_id
            columns:
              - column:
                  name: submission_id

  - changeSet:
      id: 026-index-task-submission-value-input-definition-id
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: task_submission_value
        - not:
            indexExists:
              indexName: idx_task_submission_value_input_definition_id
              tableName: task_submission_value
      changes:
        - createIndex:
            tableName: task_submission_value
            indexName: idx_task_submission_value_input_definition_id
            columns:
              - column:
                  name: input_definition_id
